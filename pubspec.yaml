name: chat
description: "Telegraph - Secure encrypted messenger with Firebase backend."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # --- Firebase ---
  firebase_core: ^3.1.1
  firebase_auth: ^5.1.2
  cloud_firestore: ^5.0.2
 

  # --- State Management ---
  provider: ^6.1.2

  # --- Storage & Databases ---
  sqflite_sqlcipher: ^3.0.0+1 
  sqflite_common_ffi: ^2.3.3
  path: ^1.9.0
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.2.3

  # --- Security & Encryption ---
  encrypt: ^5.0.3
  crypto: ^3.0.3
  pointycastle: ^3.9.1
  secure_application: ^4.1.0
  intl: ^0.20.2
  flutter_webrtc: ^1.4.1
  url_launcher: ^6.3.2
  camera: ^0.10.5+2
  image: ^4.8.0
  firebase_remote_config: ^5.5.0
  app_links: ^6.0.0
  webview_flutter: ^4.4.0
  sqflite_common: ^2.5.3 # конкретная версия без "каретки"
  permission_handler: ^12.0.1
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^17.2.0
  path_provider: ^2.1.5
  http: ^1.6.0
  googleapis_auth: ^1.4.0
  googleapis: ^12.0.0
  cryptography: ^2.9.0
  tg: ^0.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  change_app_package_name: ^1.5.0

flutter:
  uses-material-design: true

  assets:
    - assets/firebase-adminsdk.json
  #   - assets/images/
  # Если вы планируете использовать кастомные иконки или изображения, 
  # не забудьте раскомментировать и добавить пути ниже:
  # assets:
  #   - assets/images/

name: Build Android APK (unsigned)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📚 Checkout repository
        uses: actions/checkout@v4

      - name: 🔧 Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: 'stable'
          cache: true

      - name: 🧹 Remove old Android folder
        run: rm -rf android

      - name: 🏗️ Recreate Android project
        run: flutter create --platforms=android .

      - name: 🔧 Patch build.gradle (compileSdk 36, minSdk 24)
        run: |
          sed -i 's/compileSdk = 35/compileSdk = 36/g' android/app/build.gradle
          sed -i 's/compileSdkVersion 35/compileSdkVersion 36/g' android/app/build.gradle
          sed -i 's/minSdk = .*/minSdk = 24/g' android/app/build.gradle
          sed -i 's/minSdkVersion .*/minSdkVersion 24/g' android/app/build.gradle

      - name: 🩹 Patch flutter_webrtc compilation error (remove broken file)
        run: |
          # Находим путь к проблемному файлу
          WEBCACHE_PATH="$HOME/.pub-cache/hosted/pub.dev/flutter_webrtc-1.4.1/android/src/main/java/com/cloudwebrtc/webrtc/SurfaceTextureRenderer.java"
          if [ -f "$WEBCACHE_PATH" ]; then
            # Удаляем строки 115-125 (содержащие проблемный Callback)
            sed -i '115,125d' "$WEBCACHE_PATH"
            echo "✅ Patched SurfaceTextureRenderer.java"
          else
            echo "⚠️ File not found, trying alternative path"
            find ~/.pub-cache -name "SurfaceTextureRenderer.java" -exec sed -i '115,125d' {} \;
          fi

      - name: 📦 Install dependencies
        run: flutter pub get

      - name: 🔨 Build release APK (unsigned)
        run: flutter build apk --release --no-tree-shake-icons

      - name: 📁 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: telegraph-unsigned.apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
          retention-days: 14

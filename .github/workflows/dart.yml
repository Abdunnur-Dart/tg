name: Build IPA for TrollStore

on:
  push:
    tags:
      - 'v*'  # Запуск при пуше тега типа v1.0.0
  workflow_dispatch:  # Ручной запуск из интерфейса GitHub

jobs:
  build-ios-ipa:
    runs-on: macos-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.x'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Enable legacy build for iOS
        run: flutter build ios --release --no-codesign

      - name: Create IPA payload structure
        run: |
          mkdir -p build/ios/ipa/Payload
          cp -R build/ios/iphoneos/Runner.app build/ios/ipa/Payload/

      - name: Create IPA file
        run: |
          cd build/ios/ipa
          zip -r Telegraph_${{ github.ref_name }}.ipa Payload/

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: Telegraph-${{ github.ref_name }}.ipa
          path: build/ios/ipa/Telegraph_${{ github.ref_name }}.ipa

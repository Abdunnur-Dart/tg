name: Build IPA for TrollStore (Alternative)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - uses: actions/checkout@v4

    - uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.24.0'
        channel: 'stable'

    - name: Install dependencies
      run: flutter pub get

    - name: Setup Firebase config
      run: |
        echo '${{ secrets.GOOGLE_SERVICES_PLIST }}' | base64 --decode > ios/Runner/GoogleService-Info.plist

    - name: Build with xcodebuild (no signing)
      run: |
        cd ios
        xcodebuild -workspace Runner.xcworkspace \
          -scheme Runner \
          -configuration Release \
          -sdk iphoneos \
          -destination 'generic/platform=iOS' \
          -archivePath build/Runner.xcarchive \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO \
          DEVELOPMENT_TEAM="" \
          archive
        cd ..

    - name: Create IPA
      run: |
        mkdir -p Payload
        cp -r ios/build/Runner.xcarchive/Products/Applications/Runner.app Payload/
        zip -r app.ipa Payload
        rm -rf Payload

    - name: Upload IPA
      uses: actions/upload-artifact@v4
      with:
        name: TrollStore-IPA
        path: app.ipa

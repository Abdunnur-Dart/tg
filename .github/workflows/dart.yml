name: Build Android APK (unsigned)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📚 Checkout repository
        uses: actions/checkout@v4

      - name: 🔧 Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: 'stable'
          cache: true

      - name: 🔧 Fix flutter_webrtc git branch (master → main) - MUST BE BEFORE flutter create
        run: sed -i 's/ref: master/ref: main/g' pubspec.yaml

      - name: 🧹 Clean previous builds
        run: flutter clean

      - name: 🧹 Remove old Android folder
        run: rm -rf android

      - name: 🏗️ Recreate Android project (v2 embedding)
        run: flutter create --platforms=android .

      - name: 🔧 Patch build.gradle (compileSdk 36)
        run: |
          sed -i 's/compileSdk = 35/compileSdk = 36/g' android/app/build.gradle
          sed -i 's/compileSdkVersion 35/compileSdkVersion 36/g' android/app/build.gradle

      - name: 📦 Install dependencies (again, after patching)
        run: flutter pub get

      - name: 🔨 Build release APK (unsigned)
        run: flutter build apk --release --no-tree-shake-icons

      - name: 📁 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: telegraph-unsigned.apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
          retention-days: 14

name: Build IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.6'
          
      - name: Install dependencies
        run: flutter pub get
        
      - name: Fix code
        run: |
          find . -name "*.dart" -exec sed -i '' 's/withValues(alpha: /withOpacity(/g' {} \; 2>/dev/null || true
          
      - name: Build iOS
        run: flutter build ios --release --no-codesign
        
      - name: Create IPA
        run: |
          mkdir -p Payload
          cp -R build/ios/iphoneos/Runner.app Payload/
          zip -r Telegraph.ipa Payload/
          
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Telegraph.ipa
          path: Telegraph.ipa
